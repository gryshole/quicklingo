name: Release

on:
  push:
    tags:
      - "v0.*"
      - "v[1-9]*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Select-String -Path quicklingo/version.py -Pattern '__version__ = "([^"]+)"').Matches[0].Groups[1].Value
          if ("${{ github.ref_name }}" -ne "v$version") {
            Write-Error "Tag ${{ github.ref_name }} does not match version.py ($version)"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Build icon
        run: python scripts/make_icon.py

      - name: Build QuickLingo
        run: pyinstaller --noconfirm --clean QuickLingo.spec

      - name: Build updater
        run: |
          pyinstaller --noconfirm --clean QuickLingoUpdater.spec
          Copy-Item dist/QuickLingoUpdater.exe dist/QuickLingo/QuickLingoUpdater.exe

      - name: Copy config_data
        run: xcopy /E /I /Y config_data dist\QuickLingo\config_data

      - name: Create zip
        id: zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $zipName = "QuickLingo-$version-win64.zip"
          Compress-Archive -Path dist/QuickLingo/* -DestinationPath $zipName -Force
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: ${{ steps.zip.outputs.zip_name }}
          generate_release_notes: true
          body: |
            ## QuickLingo ${{ steps.version.outputs.version }}

            ### Update
            1. **First install:** unzip anywhere (e.g. `Documents\QuickLingo`). Do not use `Program Files`.
            2. **From 0.1.0+:** use **Help → Check for updates → Update now** in the app.
            3. **Manual update:** unzip over the old folder.
            4. Settings, history, and API keys in `%APPDATA%\QuickLingo\` are preserved.
            5. **QuickLingoLearning.exe** — standalone learning app (same data folder as QuickLingo.exe).
